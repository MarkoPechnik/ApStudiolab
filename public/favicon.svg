<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312E81" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />
  
  <!-- Outer brand gradient frame -->
  <rect x="96" y="96" width="320" height="320" rx="48" fill="none" stroke="url(#brandGrad)" stroke-width="28" />
  
  <!-- Stylized "A" Easel shape -->
  <path d="M256 140 L160 340 M256 140 L352 340" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" />
  <path d="M190 280 L322 280" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" />
  
  <!-- Focal accent in the upper center -->
  <circle cx="256" cy="210" r="28" fill="url(#brandGrad)" />
</svg>
